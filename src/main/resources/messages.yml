messages:
  commands:
    errors:
      notAPlayer: "<red>This command must be performed by a player."
      noPermission: "<red>You do not permission to perform this command."
      noDefinedRegions: "<red>There are no defined DAC regions."
      worldRegionsRetrieve: "<red>Error when retrieving world regions."
      dacRegionsRetrieve: "<red>Error while retrieving DAC regions."
      poolNameRetrieve: "<red>Error while retrieving pool region name."
      poolRetrieve: "<red>Error while retrieving pool region."
      worldNameRetrieve: "<red>Error while retrieving world name."
      worldRetrieve: "<red>Error while retrieving world."
      notInRegion: "<red>You are not in a DAC region."
      noDacGame: "<red>No DAC games exists in this region."
      noRegions: "<red>No regions are defined for the <gold>{dac-name}</gold> DAC."
      noBaseRegion: "<red>The base region for the <gold>{dac-name}</gold> DAC does not exist."
      noWorldGuardRegion: "<red>No WorldGuard region found for this base region."
    init:
      description: "Initializes a DAC game. Use before /dac join."
      newGameCreated: "<green>A DAC game has been created in the <gold>{dac-name}</gold> region."
      gameAlreadyInProgress: "<red>A DAC game already exists in this region."
    join:
      description: "Joins a DAC game with the specified color."
      success: "<green>You have successfully joined the DAC game in the <gold>{dac-name}</gold> region."
      noColorProvided: "<red>You must provide one of the suggested colors."
      wrongColorName: "<red>The available colors are: {colors}."
      noGameInRegion: "<red>No DAC games have been created in this region."
