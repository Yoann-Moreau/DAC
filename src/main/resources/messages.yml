      joined: "<color:{color}>{player-name} <green>has joined the DAC game in the <gold>{dac-name}</gold> region with the color <color:{color}>{color-name}<green>."
    start:
      description: "Starts the DAC game in the region where the command is executed."
      success:
      alreadyStarted: "<red>A DAC game has already been started in this region."
      noPlayers: "<red>No players have joined this DAC game."
      started: "<gold>The DAC game has started."
  gamePhases:
    newDacTurn: "<gray>A new DAC turn has begun!"
    yourTurn: "<gold>It's your turn."
    playerTurn: "<gray>It's <{player-color}>{player-name}</{player-color}>'s turn."
    suddenDeath: "<gold>The pool has been filled! It's time for sudden death!"
    tryAgain: "<yellow>All remaining players have been eliminated this turn, let's try again."
    gameOver: "<green>The DAC game is over."
    winner: "<gold>The winner is <{player-color}>{player-name}</{player-color}>."
    youAreEliminated: "<red>You have been eliminated."
    fallenPlayerEliminated: "<{player-color}>{player-name} <red>has missed the pool and has been eliminated."
    dcedPlayerEliminated: "<{player-color}>{player-name} <red>is not online and has been eliminated."
